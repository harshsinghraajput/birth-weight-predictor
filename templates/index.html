<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birth Weight Predictor</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

min-height:100vh;

padding:30px;

display:flex;

justify-content:center;

align-items:center;

overflow-y:auto;

background:
linear-gradient(
-45deg,
#0f172a,
#1e3a8a,
#0f766e,
#6d28d9
);

background-size:400%;

animation:
gradientMove 16s ease infinite;

position:relative;

}

/* Background Animation */

body::before,
body::after{

content:"";

position:fixed;

border-radius:50%;

filter:blur(130px);

z-index:-1;

animation:
float 15s infinite ease-in-out;

}

body::before{

width:450px;

height:450px;

background:#2563eb;

top:-120px;

left:-120px;

}

body::after{

width:350px;

height:350px;

background:#9333ea;

right:-100px;

bottom:-120px;

animation-delay:4s;

}

@keyframes float{

50%{

transform:
translate(70px,-50px);

}

}

@keyframes gradientMove{

0%{
background-position:0%;
}

50%{
background-position:100%;
}

100%{
background-position:0%;
}

}

/* Main Card */

.container{

width:min(95vw,550px);

padding:
clamp(25px,5vw,45px);

background:
rgba(255,255,255,.08);

backdrop-filter:
blur(25px);

border:
1px solid rgba(255,255,255,.15);

border-radius:30px;

box-shadow:
0 25px 60px rgba(0,0,0,.35);

}

/* Heading */

h1{

text-align:center;

color:white;

font-size:
clamp(2rem,5vw,3rem);

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#d1d5db;

margin-bottom:35px;

font-size:15px;

}

/* Form */

.group{

margin-bottom:18px;

}

label{

display:block;

color:white;

margin-bottom:8px;

font-weight:500;

}

input{

width:100%;

padding:16px;

border:none;

border-radius:18px;

outline:none;

font-size:16px;

background:
rgba(255,255,255,.95);

transition:.4s;

}

input:focus{

transform:
translateY(-2px);

box-shadow:
0 0 25px rgba(56,189,248,.5);

}

/* Button */

button{

width:100%;

padding:18px;

margin-top:10px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#3b82f6,
#9333ea
);

color:white;

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.4s;

}

button:hover{

transform:
translateY(-4px);

box-shadow:
0 20px 40px rgba(147,51,234,.4);

}

button:active{

transform:
scale(.98);

}

/* Prediction */

.result{

margin-top:28px;

padding:22px;

border-radius:20px;

background:
rgba(255,255,255,.08);

text-align:center;

animation:
fade .6s ease;

}

.result h2{

color:white;

margin-bottom:12px;

}

.result p{

font-size:38px;

font-weight:700;

background:
linear-gradient(
90deg,
#38bdf8,
#c084fc
);

background-clip:text;

-webkit-background-clip:text;

color:transparent;

-webkit-text-fill-color:transparent;

}

@keyframes fade{

from{

opacity:0;

transform:
translateY(20px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

/* Mobile */

@media(max-width:600px){

body{

padding:20px;

}

.container{

padding:25px;

}

input{

padding:14px;

}

button{

padding:15px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>👶 Birth Weight Predictor</h1>

<p class="subtitle">
Predict birth weight using AI
</p>

<form action="/predict" method="post">

<div class="group">
<label>Gestation</label>
<input type="number" name="gestation" required>
</div>

<div class="group">
<label>Parity</label>
<input type="number" name="parity" required>
</div>

<div class="group">
<label>Age</label>
<input type="number" name="age" required>
</div>

<div class="group">
<label>Height</label>
<input type="number" name="height" required>
</div>

<div class="group">
<label>Weight</label>
<input type="number" name="weight" required>
</div>

<div class="group">
<label>Smoke</label>
<input type="number" name="smoke" required>
</div>

<button type="submit">
Predict Birth Weight
</button>

</form>

{% if prediction %}

<div class="result">

<h2>
Predicted Birth Weight
</h2>

<p>
{{prediction}}
</p>

</div>

{% endif %}

</div>

</body>

</html>
